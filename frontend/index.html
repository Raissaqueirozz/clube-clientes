<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Clube de Clientes</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <h1>Receba promoções do mercado 🛒</h1>

        <p>
            Cadastre-se para receber ofertas exclusivas
        </p>

        <form id="form">

            <input
                type="text"
                id="nome"
                placeholder="Seu nome"
                required
            >

            <input
                type="text"
                id="telefone"
                placeholder="Seu telefone"
                required
            >

            <input
                type="text"
                id="endereco"
                placeholder="Endereço (opcional)"
            >
            <label class="checkbox">

                <input type="checkbox" required>
            
                Aceito receber promoções do mercado
            
            </label>

            <button type="submit">
                Cadastrar
            </button>

        </form>

    </div>

    <script src="script.js"></script>

</body>
</html>
